plugins {
  id 'java'
  id 'application'
}

def appName = 'PeckventureClient'
group = 'at.peckventure'
version = 'unspecified'

if (JavaVersion.current().isJava9Compatible()) {
  compileJava.options.release.set(8)
}
// Entferne oder ersetze die veralteten PREVIEW-Einstellungen
java {
  toolchain {
    languageVersion.set(JavaLanguageVersion.of(17))
  }
}

// Und setze den Release-Wert auch auf 17:
tasks.withType(JavaCompile).configureEach {
  options.release.set(17)
}



mainClassName = 'at.peckventure.Main'
application.setMainClass(mainClassName)
eclipse.project.name = appName + '-client'

repositories {
  mavenCentral()
}

dependencies {
  // LibGDX – passe die Version an deine gewünschte LibGDX-Version an
  implementation "com.badlogicgames.gdx:gdx:1.13.1"
  implementation "com.badlogicgames.gdx:gdx-backend-lwjgl3:1.13.1"
  implementation "com.badlogicgames.gdx:gdx-platform:1.13.1:natives-desktop"

  // Discord RPC – eingebunden über lokale JAR-Datei
  implementation files('libs/discord-rpc.jar')
  implementation files('libs/jna-5.17.0.jar')
  implementation files('libs/jna-platform-5.17.0.jar')


  // Falls du Box2D nutzt:
  implementation "com.badlogicgames.gdx:gdx-box2d:1.13.1"
  implementation "com.badlogicgames.gdx:gdx-box2d-platform:1.13.1:natives-desktop"

  // Zugriff auf core-Projekt
  implementation project(':core')

  // Tests
  testImplementation platform('org.junit:junit-bom:5.10.0')
  testImplementation 'org.junit.jupiter:junit-jupiter'
}

jar {
  archiveBaseName.set(appName)
  duplicatesStrategy(DuplicatesStrategy.EXCLUDE)
  dependsOn configurations.runtimeClasspath
  from {
    configurations.runtimeClasspath.collect {
      it.isDirectory() ? it : zipTree(it)
    }
  }
  exclude('META-INF/INDEX.LIST', 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA')
  dependencies {
    exclude('META-INF/INDEX.LIST', 'META-INF/maven/**')
  }
  manifest {
    attributes 'Main-Class': project.mainClassName
  }
  doLast {
    file(archiveFile).setExecutable(true, false)
  }
}

task dist(dependsOn: [jar]) {
}

test {
  useJUnitPlatform()
}
